name: Build Codex Desktop

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHIX_CACHE_NAME: edshamis-codex-desktop
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  NIX_CONFIG: experimental-features = nix-command flakes

jobs:
  evaluate:
    name: Evaluate flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - run: nix flake check --no-build --print-build-logs

  build:
    name: Build and publish package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31

      - name: Detect package changes
        id: package_changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          changed=true
          if [[ "$EVENT_NAME" == push && "$BEFORE_SHA" != 0000000000000000000000000000000000000000 ]] \
            && git cat-file -e "$BEFORE_SHA^{commit}"; then
            if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- flake.nix flake.lock; then
              changed=false
            fi
          fi
          printf 'changed=%s\n' "$changed" >> "$GITHUB_OUTPUT"

      - name: Require Cachix publication credentials
        if: steps.package_changes.outputs.changed == 'true' && env.CACHIX_AUTH_TOKEN == ''
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Cachix publication unavailable

          `CACHIX_AUTH_TOKEN` is not configured. Trusted builds fail closed so
          a green `main` revision always means its exact package was published
          and is safe for the NixOS consumer to pin.
          EOF
          exit 1

      - name: Configure Cachix for push
        if: steps.package_changes.outputs.changed == 'true'
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build exact package
        if: steps.package_changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          nix build \
            .#codex-desktop-full \
            --no-link \
            --print-build-logs \
            --max-jobs 1

      - name: Record package metadata
        if: steps.package_changes.outputs.changed == 'true'
        run: |
          printf '%s\n' \
            '## Codex Desktop package' \
            '' \
            "- Output: \`.#codex-desktop-full\`" \
            "- Revision: \`${GITHUB_SHA}\`" \
            "- Cachix publication: \`true\`" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Record unchanged package
        if: steps.package_changes.outputs.changed != 'true'
        run: |
          {
            echo '## Codex Desktop package'
            echo
            echo 'The pinned package inputs are unchanged; no build or Cachix write was needed.'
          } >> "$GITHUB_STEP_SUMMARY"
